<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanaushadhi | Botanical Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }
        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .card.expanded .accordion-content {
            grid-template-rows: 1fr;
        }
        .accordion-inner { overflow: hidden; }
        .chevron { transition: transform 0.3s ease; }
        .card.expanded .chevron { transform: rotate(180deg); }
    </style>
</head>
<body class="antialiased selection:bg-emerald-100 selection:text-emerald-900">

    <header class="sticky top-0 z-50 backdrop-blur-md bg-white/80 border-b border-gray-200/80">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="text-xs font-bold tracking-widest text-emerald-600 uppercase">Vanaushadhi</span>
                <span class="text-xs font-semibold text-gray-400">|</span>
                <span class="text-xs font-semibold tracking-wider text-gray-500 uppercase">Botanical Index</span>
            </div>
            <div class="text-[11px] font-medium text-gray-400 uppercase tracking-wider hidden sm:block">
                Ayurvedic Pharmacopoeia
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-16">
        <section class="text-center mb-16">
            <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight text-gray-900 mb-4">
                Ancient Plants. <span class="text-emerald-600">Modern Science.</span>
            </h1>
            <p class="text-lg font-normal text-gray-500 max-w-2xl mx-auto">
                A dynamic index of medicinal formulations from classical Ayurvedic texts cross-referenced with modern computational biochemistry.
            </p>
        </section>

        <section class="mb-10">
            <input type="text" id="search" onkeyup="filterPlants()" placeholder="Search plants..." 
                   class="w-full bg-white text-gray-900 placeholder-gray-400 font-medium px-6 py-4 rounded-2xl border border-gray-200 focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 shadow-sm transition-all text-base">
        </section>

        <section class="mb-12">
            <div class="flex flex-wrap gap-2 items-center">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-wider mr-2">Filter:</span>
                <button onclick="filterCategory('ALL')" class="filter-btn bg-gray-900 text-white text-xs font-bold px-4 py-2 rounded-full transition-all">ALL</button>
                <button onclick="filterCategory('ADAPTOGEN')" class="filter-btn bg-white hover:bg-gray-100 text-gray-800 text-xs font-bold px-4 py-2 rounded-full border border-gray-200 transition-all">ADAPTOGEN</button>
                <button onclick="filterCategory('ANTI-INFLAMMATORY')" class="filter-btn bg-white hover:bg-gray-100 text-gray-800 text-xs font-bold px-4 py-2 rounded-full border border-gray-200 transition-all">ANTI-INFLAMMATORY</button>
                <button onclick="filterCategory('ANTIMICROBIAL')" class="filter-btn bg-white hover:bg-gray-100 text-gray-800 text-xs font-bold px-4 py-2 rounded-full border border-gray-200 transition-all">ANTIMICROBIAL</button>
                <button onclick="filterCategory('NERVINE')" class="filter-btn bg-white hover:bg-gray-100 text-gray-800 text-xs font-bold px-4 py-2 rounded-full border border-gray-200 transition-all">NERVINE</button>
            </div>
            <div id="resultsCount" class="text-xs font-bold text-gray-400 uppercase tracking-wider mt-4">Loading database...</div>
        </section>

        <section id="plantsContainer" class="space-y-4">
            </section>
    </main>

    <script>
        let allPlants = [];
        let currentActiveCategory = 'ALL';

        // Fetch plant database from JSON file natively and sort alphabetically
        async function loadDatabase() {
            try {
                const response = await fetch('plants.json');
                allPlants = await response.json();
                
                // Sort plants alphabetically by name
                allPlants.sort((a, b) => a.name.localeCompare(b.name));
                
                renderCards(allPlants);
            } catch (error) {
                document.getElementById('resultsCount').innerText = "Error parsing database file.";
                console.error(error);
            }
        }

        function renderCards(plants) {
            const container = document.getElementById('plantsContainer');
            container.innerHTML = '';
            
            plants.forEach((plant, index) => {
                let mechanismsHTML = '';
                plant.mechanisms.forEach(m => {
                    mechanismsHTML += `
                        <div class="bg-gray-50/50 p-4 rounded-xl border border-gray-100">
                            <h4 class="text-sm font-bold text-gray-900 mb-1">${m.title}</h4>
                            <p class="text-xs font-medium text-gray-500 leading-relaxed">${m.desc}</p>
                        </div>`;
                });

                let compoundsHTML = '';
                plant.compounds.forEach(c => {
                    compoundsHTML += `<span class="bg-gray-100 text-gray-800 text-[11px] font-bold px-2.5 py-1 rounded-md tracking-wide">${c}</span> `;
                });

                const cardHTML = `
                    <div class="card bg-white border border-gray-200 rounded-2xl p-6 transition-all duration-300 hover:shadow-md hover:border-gray-300 cursor-pointer group" onclick="toggleCard(this)">
                        <div class="flex items-center justify-between">
                            <div>
                                <div class="flex flex-wrap items-baseline gap-x-2 gap-y-1">
                                    <h2 class="text-2xl font-bold text-gray-900">${plant.name}</h2>
                                    <span class="text-base font-semibold text-emerald-600 italic">${plant.botanical}</span>
                                    <span class="text-sm font-bold text-gray-400">${plant.sanskrit}</span>
                                </div>
                                <p class="text-xs font-bold text-gray-400 tracking-wide mt-1 uppercase">${plant.family}</p>
                            </div>
                            <svg class="chevron w-5 h-5 text-gray-400 group-hover:text-gray-600 shrink-0 ml-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                        <div class="accordion-content">
                            <div class="accordion-inner">
                                <div class="border-t border-gray-100 mt-6 pt-6 space-y-6">
                                    <div>
                                        <h3 class="text-xs font-extrabold text-gray-400 uppercase tracking-wider mb-2">Classical Use</h3>
                                        <p class="text-sm font-medium text-gray-700 leading-relaxed">${plant.use}</p>
                                    </div>
                                    <div>
                                        <h3 class="text-xs font-extrabold text-gray-400 uppercase tracking-wider mb-2">Application Method</h3>
                                        <p class="text-sm font-medium text-amber-700 bg-amber-50/60 inline-block px-3 py-1.5 rounded-lg border border-amber-100 leading-relaxed">${plant.application}</p>
                                    </div>
                                    <div>
                                        <h3 class="text-xs font-extrabold text-gray-400 uppercase tracking-wider mb-2">Active Compounds</h3>
                                        <div class="flex flex-wrap gap-1.5 mb-2">${compoundsHTML}</div>
                                        <p class="text-xs font-semibold text-gray-400">Parts used: <span class="text-gray-600">${plant.parts}</span></p>
                                    </div>
                                    <div>
                                        <h3 class="text-xs font-extrabold text-gray-400 uppercase tracking-wider mb-3">Mechanisms of Action</h3>
                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${mechanismsHTML}</div>
                                    </div>
                                    <div class="text-[11px] font-bold text-gray-400 uppercase tracking-wider pt-2">Source text: ${plant.source}</div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                container.innerHTML += cardHTML;
            });
            document.getElementById('resultsCount').innerText = `${plants.length} plants found`;
        }

        function toggleCard(cardElement) {
            if (window.getSelection().toString() || event.target.closest('.accordion-content')) return;
            const isAlreadyExpanded = cardElement.classList.contains('expanded');
            document.querySelectorAll('.card.expanded').forEach(card => card.classList.remove('expanded'));
            if (!isAlreadyExpanded) cardElement.classList.add('expanded');
        }

        function filterPlants() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = allPlants.filter(plant => {
                const matchesSearch = plant.name.toLowerCase().includes(query) || 
                                      plant.botanical.toLowerCase().includes(query) || 
                                      plant.use.toLowerCase().includes(query) ||
                                      plant.compounds.some(c => c.toLowerCase().includes(query));
                const matchesCategory = currentActiveCategory === 'ALL' || plant.category === currentActiveCategory;
                return matchesSearch && matchesCategory;
            });
            renderCards(filtered);
        }

        function filterCategory(categoryName) {
            currentActiveCategory = categoryName;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = btn.innerText === categoryName ? 
                    "filter-btn bg-gray-900 text-white text-xs font-bold px-4 py-2 rounded-full transition-all" : 
                    "filter-btn bg-white hover:bg-gray-100 text-gray-800 text-xs font-bold px-4 py-2 rounded-full border border-gray-200 transition-all";
            });
            filterPlants();
        }

        window.onload = loadDatabase;
    </script>
</body>
</html>
